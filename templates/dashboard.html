<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SensorFlow MQTT – Industrial Monitoring</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
    <main class="dashboard">
        <header class="dashboard-header">
            <h1>SensorFlow MQTT – Industrial Monitoring</h1>
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <a href="/apidocs/" target="_blank" class="doc-link">API Docs</a>
                <span id="alarm-badge" class="alarm-badge">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2zm.995-14.901a1 1 0 1 0-1.99 0A5.002 5.002 0 0 0 3 6c0 1.098-.5 6-2 7h14c-1.5-1-2-5.902-2-7 0-2.42-1.72-4.44-4.005-4.901z"/>
                    </svg>
                    <span id="alarm-count">0</span> active
                </span>
                <span id="current-time" class="time"></span>
            </div>
        </header>

        <section class="sensor-group">
            <h2 class="group-title">Sensors – Group 1</h2>
            <div class="sensors-grid" id="sensors-container-1">
                <p>Loading sensors...</p>
            </div>
        </section>

        <section class="sensor-group">
            <h2 class="group-title">Sensors – Group 2</h2>
            <div class="sensors-grid" id="sensors-container-2">
                <p>Loading sensors...</p>
            </div>
        </section>

        <div id="time-filter-container" class="time-filter-container"></div>

        <section class="type-trends-grid" id="type-trends-container"></section>

        <section class="event-log-section">
            <h2 class="group-title">Event Log</h2>
            <div class="event-log" id="event-log-container">
                <p class="event-empty">No events recorded yet.</p>
            </div>
        </section>
        <section class="export-section">
            <h2 class="group-title">Export Data</h2>
            <div class="export-controls">
                <select id="export-sensor-select" class="sensor-select">
                    <option value="">All sensors</option>
                </select>
                <button id="btn-export-csv" class="control-btn">Download CSV</button>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
